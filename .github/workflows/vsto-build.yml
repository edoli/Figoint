name: VSTO Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: setup-msbuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2.0.0

    - name: Restore NuGet packages
      run: nuget restore ${{github.workspace}}\Figoint.sln

    - name: Configure signing
      shell: pwsh
      env:
        CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        CERT_PFX_BASE64: ${{ secrets.CERT_PFX_BASE64 }}
      run: |
        if ([string]::IsNullOrWhiteSpace($env:CERT_PFX_BASE64)) {
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            throw "CERT_PFX_BASE64 is required for tagged release builds."
          }
          Add-Content -Path $Env:GITHUB_ENV -Value "SIGN_MANIFESTS=false"
          exit 0
        }
        if ([string]::IsNullOrWhiteSpace($env:CERT_PASSWORD)) {
          throw "CERT_PASSWORD is required when CERT_PFX_BASE64 is set."
        }
        $Secure_String_Pwd = ConvertTo-SecureString $env:CERT_PASSWORD -AsPlainText -Force
        [IO.File]::WriteAllBytes("signing_cert.pfx", [Convert]::FromBase64String($env:CERT_PFX_BASE64))
        Import-PfxCertificate -FilePath signing_cert.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $Secure_String_Pwd
        Add-Content -Path $Env:GITHUB_ENV -Value "SIGN_MANIFESTS=true"
      
    - name: Build VSTO
      shell: pwsh
      run: msbuild ${{github.workspace}}\Figoint.sln -t:rebuild /p:Platform="Any CPU" /p:Configuration="Release" /p:SignManifests=$env:SIGN_MANIFESTS /nologo /nr:false /p:VisualStudioVersion="17.0"


    - name: Create ZIP file
      if: startsWith(github.ref, 'refs/tags/v')
      run: Compress-Archive -Path Figoint\bin\Release\* -DestinationPath release.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./release.zip
        asset_name: Figoint-${{ github.ref_name }}.zip
        asset_content_type: application/zip
name: VSTO Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: setup-msbuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2.0.0

    - name: Restore NuGet packages
      run: nuget restore ${{github.workspace}}\Figoint.sln

    - name: Import certificate from the command-line
      shell: pwsh
      run: |
        $Secure_String_Pwd = ConvertTo-SecureString "${{ secrets.CERT_PASSWORD }}" -AsPlainText -Force
        [IO.File]::WriteAllBytes("signing_cert.pfx", [Convert]::FromBase64String("${{ secrets.CERT_PFX_BASE64 }}"))
        Import-PfxCertificate -FilePath signing_cert.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $Secure_String_Pwd
      
    - name: Set VS.net environment
      run: cmd.exe /C CALL "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"

    - name: Build VSTO
      run: msbuild ${{github.workspace}}\Figoint.sln -t:rebuild /p:Platform="Any CPU" /p:Configuration="Release" /nologo /nr:false /p:VisualStudioVersion="17.0"


    - name: Create ZIP file
      run: Compress-Archive -Path Figoint\bin\Release\* -DestinationPath release.zip

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./release.zip
        asset_name: Figoint_${{ github.ref_name }}.zip
        asset_content_type: application/zip